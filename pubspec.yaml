name: pharmacy_system
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  http: ^1.2.0
  supabase_flutter: ^2.16.0
  supabase: ^2.6.0
  crypto: ^3.0.3
  uuid: ^4.0.0
  dio: ^5.7.0
  connectivity_plus: ^5.0.2
  flutter_secure_storage: ^9.2.0
  just_audio: ^0.9.34
  mobile_scanner: ^6.0.2
  image_picker: ^1.0.7
  flutter_localizations:
    sdk: flutter
  pdf: ^3.12.0
  printing: ^5.14.3
  archive: ^3.6.1
  excel: ^4.0.0
  file_picker: ^8.0.0
  path_provider: ^2.1.5
  path: ^1.9.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  gap: ^3.0.1
  drift: ^2.26.0
  sqlite3: ^2.7.0
  sqlite3_flutter_libs: ^0.5.0
  sqflite_common_ffi: ^2.3.0
  # flutter_dotenv removed; using assets/config.json instead
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  flutter_bloc: ^9.1.0
  hydrated_bloc: ^10.0.0
  equatable: ^2.0.7
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  get_it: ^8.0.2
  go_router: ^17.3.0
  toastification: ^3.2.0
  wolt_modal_sheet: ^0.11.0
  sentry_flutter: ^8.12.0
  collection: ^1.19.0
  window_manager: ^0.4.3
  shared_preferences: ^2.3.0
  gotrue: ^2.22.0
  web: ^1.1.1
  meta: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.1
  drift_dev: ^2.26.0

flutter:
  uses-material-design: true

  assets:
    - assets/favicon.ico
    - assets/images/
    - assets/fonts/
    - assets/sounds/
    - assets/config.json

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/item-placeholder.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/item-placeholder.png"
    favicon_path: "assets/favicon.ico"
